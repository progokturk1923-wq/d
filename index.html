<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlıştırMAYA - Yönetim & Eğitim</title>
    <style>
        :root { --primary-color: #4a90e2; --secondary-color: #f39c12; --bg-color: #f4f7f6; --admin-color: #e74c3c; --success-color: #2ecc71; --purple-color: #9b59b6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 480px; max-height: 95vh; overflow-y: auto; }
        .hidden { display: none !important; }
        .menu-container, .form-container, .dashboard { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; font-size: 14px; }
        .btn-teacher { background: var(--primary-color); color: white; }
        .btn-student { background: var(--success-color); color: white; }
        .btn-logout { background: #95a5a6; color: white; margin-top: 10px; }
        .btn-back { background: #dfe6e9; color: #2d3436; margin-top: 5px; } /* Geri Dön Buton Stili */
        .btn-danger { background: var(--admin-color); color: white; padding: 5px 10px; font-size: 11px; }
        
        input, select, textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 5px; }
        .card { background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #eee; margin-bottom: 10px; text-align: left; font-size: 13px; }
        .football-field { background: #2ecc71; height: 80px; position: relative; border-radius: 5px; border: 2px solid white; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ball { width: 18px; height: 18px; background: white; border-radius: 50%; position: absolute; bottom: 5px; transition: 0.5s; }
        #chatMessages { height: 200px; border: 1px solid #eee; overflow-y: auto; padding: 10px; background: #fff; border-radius: 10px; text-align: left; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--primary-color);">AlıştırMAYA</h1>

    <!-- ANA MENÜ -->
    <div id="mainMenu" class="menu-container">
        <button class="btn btn-teacher" onclick="showPage('teacherLoginPage')">Öğretmen Girişi</button>
        <button class="btn btn-student" onclick="showPage('studentPage')">Öğrenci Girişi</button>
        <button class="btn" style="background:var(--admin-color); color:white;" onclick="showPage('adminLoginPage')">Yetkili Paneli</button>
        <button class="btn" style="border:2px solid var(--secondary-color); color:var(--secondary-color);" onclick="showPage('signupPage')">Kaydol</button>
    </div>

    <!-- ÖĞRETMEN GİRİŞ -->
    <div id="teacherLoginPage" class="form-container hidden">
        <h2>Öğretmen Girişi</h2>
        <select id="tNameSelect"><option value="">İsim Seçin</option></select>
        <input type="password" id="tPassInput" placeholder="Şifre">
        <button class="btn btn-teacher" onclick="teacherLogin()">Giriş Yap</button>
        <button class="btn btn-back" onclick="showPage('mainMenu')">← Ana Menüye Dön</button>
    </div>

    <!-- ÖĞRETMEN PANELİ -->
    <div id="teacherDashboard" class="dashboard hidden">
        <h2 id="teacherWelcome">Hoş Geldiniz</h2>
        <div class="card">
            <h4>📢 Duyuru Yayınla</h4>
            <textarea id="announcementMsg" placeholder="Duyurunuz..." rows="2" style="width:90%"></textarea>
            <button class="btn btn-teacher" style="width:100%" onclick="postAnnouncement()">Yayınla</button>
        </div>
        <button class="btn btn-logout" onclick="showPage('mainMenu')">Çıkış Yap</button>
    </div>

    <!-- ÖĞRENCİ GİRİŞ -->
    <div id="studentPage" class="form-container hidden">
        <h2>Öğrenci Girişi</h2>
        <input type="text" id="sName" placeholder="Ad Soyad">
        <input type="password" id="sPass" placeholder="Şifre">
        <button class="btn btn-student" onclick="studentLogin()">Giriş Yap</button>
        <button class="btn btn-back" onclick="showPage('mainMenu')">← Ana Menüye Dön</button>
    </div>

    <!-- ÖĞRENCİ DASHBOARD -->
    <div id="studentDashboard" class="dashboard hidden">
        <h2 id="welcomeText">Merhaba!</h2>
        <div id="announcementArea" class="card hidden">
            <b>DUYURU:</b> <p id="announcementText"></p>
        </div>
        <button class="btn" style="background:#f1c40f; color:#333;" onclick="showPage('gamesPage')">⚽ Futbol Penaltı</button>
        <button class="btn" style="background:var(--purple-color); color:white;" onclick="openChat()">💬 Sohbet</button>
        <button class="btn" style="background:#1abc9c; color:white;" onclick="showPage('supportPage')">🛠️ Destek</button>
        <button class="btn btn-logout" onclick="showPage('mainMenu')">Güvenli Çıkış</button>
    </div>

    <!-- YETKİLİ GİRİŞ -->
    <div id="adminLoginPage" class="form-container hidden">
        <h2>Yetkili Girişi</h2>
        <input type="password" id="adminPass" placeholder="Admin Şifresi">
        <button class="btn" style="background:var(--admin-color); color:white;" onclick="checkAdmin()">Sisteme Gir</button>
        <button class="btn btn-back" onclick="showPage('mainMenu')">← Ana Menüye Dön</button>
    </div>

    <!-- YETKİLİ PANELİ -->
    <div id="adminPanel" class="form-container hidden">
        <h2 style="color:var(--admin-color)">Sistem Yönetimi</h2>
        <div class="card">
            <h4>📢 Aktif Duyuru</h4>
            <div id="currentAnnounce">Yükleniyor...</div>
            <button id="delAnnounceBtn" class="btn-danger hidden" onclick="deleteAnnouncement()">Duyuruyu Kaldır</button>
        </div>
        <h4>👥 Bekleyen Kayıtlar</h4>
        <div id="requestList"></div>
        <h4>✅ Onaylı Hesaplar</h4>
        <div id="accountList" style="max-height: 100px; overflow-y: auto;"></div>
        <h4>📩 Destek</h4>
        <div id="adminSupportList"></div>
        <button class="btn btn-logout" onclick="showPage('mainMenu')">Çıkış Yap</button>
    </div>

    <!-- KAYDOL SAYFASI -->
    <div id="signupPage" class="form-container hidden">
        <h2>Yeni Kayıt</h2>
        <input type="text" id="regName" placeholder="Ad Soyad">
        <input type="password" id="regPass" placeholder="Şifre Belirleyin">
        <button class="btn btn-student" onclick="sendRequest()">Onay İsteği Gönder</button>
        <button class="btn btn-back" onclick="showPage('mainMenu')">← Geri Dön</button>
    </div>

    <!-- OYUN SAYFASI -->
    <div id="gamesPage" class="form-container hidden">
        <h3>Futbol Penaltı</h3>
        <div class="football-field"><div id="gameBall" class="ball"></div></div>
        <div id="quizBox" class="card"><p id="questionText"></p><div id="optionsContainer"></div></div>
        <button class="btn btn-back" onclick="showPage('studentDashboard')">← Panele Dön</button>
    </div>

    <!-- SOHBET SAYFASI -->
    <div id="chatPage" class="form-container hidden">
        <h3>Okul Sohbeti</h3>
        <div id="chatMessages"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="chatInput" style="flex:1" placeholder="Mesaj...">
            <button class="btn btn-student" onclick="sendMessage()">></button>
        </div>
        <button class="btn btn-back" onclick="showPage('studentDashboard')">← Panele Dön</button>
    </div>

    <!-- DESTEK SAYFASI -->
    <div id="supportPage" class="form-container hidden">
        <h3>Destek Talebi</h3>
        <textarea id="supportMsg" rows="4" placeholder="Mesajınızı buraya yazın..."></textarea>
        <button class="btn btn-student" onclick="sendSupportTicket()">Gönder</button>
        <button class="btn btn-back" onclick="showPage('studentDashboard')">← Panele Dön</button>
    </div>

</div>

<script>
    // Firebase Config ve Temel Fonksiyonlar (Öncekiyle aynı)
    const firebaseConfig = {
        apiKey: "AIzaSyCyHVJ33ETHgP1mPDMVzJAOt86Q9hMk1r4",
        authDomain: "alistirmaya.firebaseapp.com",
        databaseURL: "https://alistirmaya-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "alistirmaya",
        storageBucket: "alistirmaya.appspot.com",
        messagingSenderId: "220036412672",
        appId: "1:220036412672:web:c0b32848541259f466efe5"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const teachers = [
        { name: "Ayşe Terzioğlu", pass: "AyşeTerzioğluFen" }, { name: "Simge Tetik", pass: "SimgeTetikMat" },
        { name: "Bahadır Say", pass: "BahadırSayMat" }, { name: "Dilara Keyhidar", pass: "DilaraKeyhidarTür" },
        { name: "Ensar Balakar", pass: "EnsarBalakarİng" }, { name: "Mithat Yazgın", pass: "MithatYazgınRobo" }
    ];

    let currentUser = null;
    const tSelect = document.getElementById('tNameSelect');
    teachers.forEach(t => { let opt = document.createElement('option'); opt.value = t.name; opt.innerText = t.name; tSelect.appendChild(opt); });

    function showPage(pageId) {
        document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'studentDashboard' || pageId === 'adminPanel') loadAnnouncements();
        if(pageId === 'gamesPage') loadQuestion();
    }

    // --- ÖĞRETMEN VE GİRİŞ İŞLEMLERİ ---
    function teacherLogin() {
        const name = tSelect.value;
        const pass = document.getElementById('tPassInput').value;
        const found = teachers.find(t => t.name === name && t.pass === pass);
        if(found) { currentUser = found.name; document.getElementById('teacherWelcome').innerText = "Sn. " + found.name; showPage('teacherDashboard'); }
        else alert("Hatalı Giriş!");
    }

    function studentLogin() {
        const name = document.getElementById('sName').value.trim();
        const pass = document.getElementById('sPass').value;
        const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
        database.ref('istekler/' + id).once('value', s => {
            const u = s.val();
            if(u && u.pass === pass && u.status === "approved") { currentUser = u.name; showPage('studentDashboard'); }
            else alert("Giriş reddedildi veya onay bekliyor.");
        });
    }

    // --- YETKİLİ İŞLEMLERİ ---
    function checkAdmin() {
        if(document.getElementById('adminPass').value === "ÖHG613725") { showPage('adminPanel'); loadAdminData(); }
        else alert("Şifre Yanlış!");
    }

    function loadAdminData() {
        database.ref('istekler').on('value', snap => {
            const reqList = document.getElementById('requestList');
            const accList = document.getElementById('accountList');
            reqList.innerHTML = ""; accList.innerHTML = "";
            snap.forEach(c => {
                const u = c.val();
                if(u.status === "pending") { reqList.innerHTML += `<div class='card'>${u.name} <button onclick="approve('${c.key}')">Onayla</button></div>`; }
                else { accList.innerHTML += `<div class='card' style='display:flex; justify-content:space-between;'>${u.name} <button class='btn-danger' onclick="deleteAccount('${c.key}')">Sil</button></div>`; }
            });
        });
        database.ref('destek_talepleri').on('value', snap => {
            const list = document.getElementById('adminSupportList'); list.innerHTML = "";
            snap.forEach(c => { list.innerHTML += `<div class='card'><b>${c.val().sender}:</b> ${c.val().message}</div>`; });
        });
    }

    function approve(id) { database.ref('istekler/' + id).update({status: "approved"}); }
    function deleteAccount(id) { if(confirm("Hesabı silmek istediğinize emin misiniz?")) database.ref('istekler/' + id).remove(); }
    
    // --- DUYURU VE DİĞER ---
    function postAnnouncement() {
        const msg = document.getElementById('announcementMsg').value;
        if(msg) { database.ref('duyuru').set({ text: msg, author: currentUser }); alert("Duyuru yayınlandı!"); }
    }

    function deleteAnnouncement() { if(confirm("Duyuru silinsin mi?")) database.ref('duyuru').remove(); }

    function loadAnnouncements() {
        database.ref('duyuru').on('value', snap => {
            const data = snap.val();
            const sArea = document.getElementById('announcementArea');
            const aText = document.getElementById('announcementText');
            const adminText = document.getElementById('currentAnnounce');
            const adminDelBtn = document.getElementById('delAnnounceBtn');
            if(data) {
                if(sArea) { sArea.classList.remove('hidden'); aText.innerText = data.text + " (Yazan: " + data.author + ")"; }
                if(adminText) { adminText.innerHTML = `<b>${data.author}:</b> ${data.text}`; adminDelBtn.classList.remove('hidden'); }
            } else {
                if(sArea) sArea.classList.add('hidden');
                if(adminText) { adminText.innerText = "Aktif duyuru yok."; adminDelBtn.classList.add('hidden'); }
            }
        });
    }

    // --- OYUN MANTIĞI ---
    const footballQuiz = [
        { q: "Dünya Kupası'nı en çok kazanan ülke?", a: "Brezilya", options: ["Almanya", "Brezilya", "İspanya", "Fransa"] },
        { q: "Messi kaç yılında Ballon d'Or kazandı?", a: "8", options: ["5", "6", "7", "8"] }
    ];
    let currentQ = 0;

    function loadQuestion() {
        const qData = footballQuiz[currentQ];
        document.getElementById('gameBall').style.bottom = "5px";
        document.getElementById('questionText').innerText = qData.q;
        const optContainer = document.getElementById('optionsContainer'); optContainer.innerHTML = "";
        qData.options.forEach(opt => {
            const btn = document.createElement('div'); btn.className = "quiz-option"; btn.innerText = opt;
            btn.onclick = () => {
                if(opt === qData.a) { document.getElementById('gameBall').style.bottom = "60px"; alert("GOOOL!"); }
                else alert("Kaçtı!");
                setTimeout(() => { currentQ = (currentQ + 1) % footballQuiz.length; loadQuestion(); }, 1000);
            };
            optContainer.appendChild(btn);
        });
    }

    // --- SOHBET VE DESTEK ---
    function sendSupportTicket() {
        const m = document.getElementById('supportMsg').value;
        if(m && currentUser) { database.ref('destek_talepleri').push({ sender: currentUser, message: m }); alert("Talebiniz iletildi."); showPage('studentDashboard'); }
    }

    function openChat() { showPage('chatPage'); loadChat(); }
    function sendMessage() {
        const i = document.getElementById('chatInput');
        if(i.value) { database.ref('mesajlar').push({ sender: currentUser, text: i.value }); i.value = ""; }
    }
    function loadChat() {
        database.ref('mesajlar').limitToLast(20).on('value', snap => {
            const b = document.getElementById('chatMessages'); b.innerHTML = "";
            snap.forEach(c => { b.innerHTML += `<div><b>${c.val().sender}:</b> ${c.val().text}</div>`; });
            b.scrollTop = b.scrollHeight;
        });
    }

    function sendRequest() {
        const name = document.getElementById('regName').value.trim();
        const pass = document.getElementById('regPass').value;
        if(name && pass) {
            const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_');
            database.ref('istekler/' + id).set({ name, pass, status: "pending" });
            alert("İsteğiniz yetkiliye iletildi."); showPage('mainMenu');
        }
    }
</script>
</body>
</html>
